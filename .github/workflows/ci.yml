name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild -project mkql.xcodeproj -scheme mkql -destination 'platform=macOS' build

      - name: Test
        run: xcodebuild -project mkql.xcodeproj -scheme mkql -destination 'platform=macOS' test
